# Rate limiting zones
limit_req_zone $binary_remote_addr zone=general:10m     rate=30r/s;
limit_req_zone $binary_remote_addr zone=room_create:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=msg_send:10m    rate=10r/m;
# LLM arbiter refresh — expensive (1 LLM call per message). Hard cap.
limit_req_zone $binary_remote_addr zone=llm_refresh:10m rate=6r/m;
# Skill uploads — each up to 512 KB, disk-fill risk.
limit_req_zone $binary_remote_addr zone=skill_up:10m    rate=10r/m;
# MCP JSON-RPC — allows polling bursts but caps sustained abuse.
limit_req_zone $binary_remote_addr zone=mcp:10m         rate=60r/m;

server {
    server_name roomcomm.ru www.roomcomm.ru roomcomm.xyz www.roomcomm.xyz;
    client_max_body_size 1m;
    server_tokens off;

    # Security headers (always = applied even on error/proxy responses).
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;

    location /admin/ {
        access_log off;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /yandex_4c25c6da8596932a.html {
        alias /var/www/roomcomm/yandex_4c25c6da8596932a.html;
        default_type "text/html";
    }
    location = /llms.txt {
        alias /var/www/roomcomm/llms.txt;
        default_type "text/plain; charset=utf-8";
        add_header Cache-Control "public, max-age=300";
    }
    location = /agents.md {
        alias /var/www/roomcomm/agents.md;
        default_type "text/markdown; charset=utf-8";
        add_header Cache-Control "public, max-age=300";
    }
    location = /commroom-skill.tar.gz  { return 301 /roomcomm-skill.tar.gz; }
    location = /skill/scripts/commroom.py { return 301 /skill/scripts/roomcomm.py; }
    location = /roomcomm-skill.tar.gz {
        alias /var/www/roomcomm/roomcomm-skill.tar.gz;
        default_type application/gzip;
        add_header Cache-Control "public, max-age=300";
    }
    location /skills-cdn/ {
        alias /var/lib/commroom/data/skills/;
        default_type application/gzip;
        add_header Content-Disposition "attachment";
        add_header Cache-Control "public, max-age=86400, immutable";
    }
    location /skill/ {
        alias /var/www/roomcomm/skill/;
        autoindex on;
        types { text/markdown md; text/x-python py; }
        default_type text/plain;
        charset utf-8;
        add_header Cache-Control "public, max-age=300";
    }

    # MCP — SSE, no buffering
    location ~ ^/mcp(/.*)?$ {
        limit_req zone=mcp burst=30 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
    }

    # Rate-limit LLM arbiter refresh: expensive, 6/min per IP
    location ~ ^/api/rooms/[^/]+/context/refresh$ {
        limit_req zone=llm_refresh burst=2 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # Rate-limit skill uploads: 10/min per IP (disk-fill protection)
    location = /api/skills {
        limit_req zone=skill_up burst=3 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Rate-limit room creation: 5/min per IP
    location = /api/rooms {
        limit_req zone=room_create burst=3 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Rate-limit message sending: 10/min per IP
    location ~ ^/api/rooms/[^/]+/messages$ {
        limit_req zone=msg_send burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        limit_req zone=general burst=60 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 5s;
    }

    listen [::]:443 ssl ipv6only=on;
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/roomcomm.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/roomcomm.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = www.roomcomm.ru)  { return 301 https://$host$request_uri; }
    if ($host = roomcomm.ru)      { return 301 https://$host$request_uri; }
    if ($host = www.roomcomm.xyz) { return 301 https://$host$request_uri; }
    if ($host = roomcomm.xyz)     { return 301 https://$host$request_uri; }
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name roomcomm.ru www.roomcomm.ru roomcomm.xyz www.roomcomm.xyz;
    return 404;
}
