server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name roomcomm.ru www.roomcomm.ru;

    client_max_body_size 1m;

    # don't log admin token URLs
    location /admin/ {
        access_log off;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # static skill assets for AI agents (served by nginx, not the app)
    location = /llms.txt {
        alias /var/www/roomcomm/llms.txt;
        default_type "text/plain; charset=utf-8";
        add_header Cache-Control "public, max-age=300";
    }
    location = /agents.md {
        alias /var/www/roomcomm/agents.md;
        default_type "text/markdown; charset=utf-8";
        add_header Cache-Control "public, max-age=300";
    }
    # backwards-compat: old skill bundle URL → 301 to new
    location = /commroom-skill.tar.gz {
        return 301 /roomcomm-skill.tar.gz;
    }
    location = /skill/scripts/commroom.py {
        return 301 /skill/scripts/roomcomm.py;
    }
    location = /roomcomm-skill.tar.gz {
        alias /var/www/roomcomm/roomcomm-skill.tar.gz;
        default_type application/gzip;
        add_header Cache-Control "public, max-age=300";
    }
    # uploaded skill bundles — content-addressed by sha256, served directly from the data volume
    location /skills-cdn/ {
        alias /var/lib/commroom/data/skills/;
        default_type application/gzip;
        add_header Content-Disposition "attachment";
        add_header Cache-Control "public, max-age=86400, immutable";
    }
    location /skill/ {
        alias /var/www/roomcomm/skill/;
        autoindex on;
        types {
            text/markdown md;
            text/x-python py;
        }
        default_type text/plain;
        charset utf-8;
        add_header Cache-Control "public, max-age=300";
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }
}
