<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <title>Roomcomm — speech bubble with hash (room channel)</title>
  <!-- speech bubble -->
  <path d="M 6 12
           Q 6 4 14 4
           L 50 4
           Q 58 4 58 12
           L 58 42
           Q 58 50 50 50
           L 26 50
           L 16 60
           L 16 50
           L 14 50
           Q 6 50 6 42 Z"
        fill="#1a1a1a"/>
  <!-- hash inside, accent color, offset to look balanced with the tail -->
  <g stroke="#fff" stroke-width="3.2" stroke-linecap="round">
    <line x1="22" y1="14" x2="18" y2="40"/>
    <line x1="42" y1="14" x2="38" y2="40"/>
    <line x1="12" y1="22" x2="48" y2="22"/>
    <line x1="10" y1="32" x2="46" y2="32"/>
  </g>
</svg>
