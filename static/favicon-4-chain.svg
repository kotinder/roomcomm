<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <title>Roomcomm — speech bubble containing a hash chain (ledger)</title>
  <!-- speech bubble outline -->
  <path d="M 6 12
           Q 6 4 14 4
           L 50 4
           Q 58 4 58 12
           L 58 42
           Q 58 50 50 50
           L 26 50
           L 16 60
           L 16 50
           L 14 50
           Q 6 50 6 42 Z"
        fill="none" stroke="#1a1a1a" stroke-width="4"/>
  <!-- two interlocking chain links inside, slightly tilted -->
  <g fill="none" stroke="#6e3acb" stroke-width="3.5" stroke-linecap="round">
    <!-- left link (horizontal oval) -->
    <ellipse cx="22" cy="27" rx="10" ry="6" transform="rotate(-15 22 27)"/>
    <!-- right link (horizontal oval), overlapping -->
    <ellipse cx="40" cy="27" rx="10" ry="6" transform="rotate(15 40 27)"/>
  </g>
</svg>
